<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
<title id="title">Gruppierte Sketchy-Route der Atemmuskulatur</title>
<desc id="desc">Ein zusammenhängender Atem-Theater-Routenplan: links Inspiration, rechts forcierte Exspiration, mit sieben gruppierten Stationen.</desc>
<defs>
  <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="7" result="noise"/><feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8"/></filter>
  <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <linearGradient id="bg" x1="0" x2="1"><stop stop-color="#282a36"/><stop offset="1" stop-color="#1e1f29"/></linearGradient>
  <linearGradient id="insp" x1="0" x2="1"><stop stop-color="#50fa7b" stop-opacity=".28"/><stop offset="1" stop-color="#8be9fd" stop-opacity=".08"/></linearGradient>
  <linearGradient id="exsp" x1="0" x2="1"><stop stop-color="#ffb86c" stop-opacity=".10"/><stop offset="1" stop-color="#ff5555" stop-opacity=".27"/></linearGradient>
  <marker id="arrowGold" markerWidth="18" markerHeight="18" refX="12" refY="6" orient="auto"><path d="M0,0 L14,6 L0,12 Z" fill="#f1fa8c"/></marker>
  <style>
    .label{font-family:Inter,system-ui,sans-serif;font-weight:900;fill:#f8f8f2;paint-order:stroke;stroke:#282a36;stroke-width:6px;stroke-linejoin:round}
    .small{font-family:Inter,system-ui,sans-serif;font-weight:800;fill:#c7c9d9;paint-order:stroke;stroke:#282a36;stroke-width:4px;stroke-linejoin:round}
    .mini{font-size:20px}.med{font-size:26px}.big{font-size:42px}.huge{font-size:56px}
    .rough{filter:url(#rough)}.rib{fill:none;stroke:#f8f8f2;stroke-width:10;opacity:.28;stroke-linecap:round}.route{fill:none;stroke:#f1fa8c;stroke-width:13;stroke-dasharray:28 24;marker-end:url(#arrowGold);filter:url(#glow);opacity:.88}.green{fill:#50fa7b}.orange{fill:#ffb86c}.pink{fill:#ff79c6}.cyan{fill:#8be9fd}.red{fill:#ff5555}.yellow{fill:#f1fa8c}
  </style>
</defs>
<rect width="1600" height="1000" fill="url(#bg)"/>
<rect x="55" y="78" width="690" height="835" rx="44" fill="url(#insp)" stroke="#50fa7b" stroke-width="5"/>
<rect x="855" y="78" width="690" height="835" rx="44" fill="url(#exsp)" stroke="#ffb86c" stroke-width="5"/>
<text x="90" y="145" class="label big green">INSPIRATION: ZIEHEN + ÖFFNEN</text>
<text x="890" y="140" class="label med orange">FORCIERTE EXSPIRATION</text>
<text x="890" y="172" class="label mini orange">PRESSEN · HUSTEN · BAUCHPRESSE</text>
<text x="95" y="184" class="small med">Thorax wird größer: Kuppel ↓, Rippen ↑/außen, Schultergürtel fixiert</text>
<text x="895" y="202" class="small mini">Ruheausatmung passiv — aktiv bei Husten, Pressen, Dyspnoe</text>
<!-- rib cage frame -->
<path class="rib rough" d="M145 235 C70 420 80 650 178 835"/><path class="rib rough" d="M1455 235 C1530 420 1520 650 1422 835"/>
<path class="rib rough" d="M220 220 C530 95 1070 95 1380 220"/><path class="rib rough" d="M235 840 C540 950 1060 950 1365 840"/>
<!-- central diaphragm -->
<ellipse cx="800" cy="590" rx="230" ry="82" fill="#8be9fd" opacity=".17" stroke="#8be9fd" stroke-width="5"/>
<path d="M560 585 C655 505 745 495 800 565 C860 495 965 505 1040 585" fill="none" stroke="#8be9fd" stroke-width="12" stroke-linecap="round" opacity=".72"/>
<text x="800" y="625" text-anchor="middle" class="label big cyan">1 Diaphragma-Kuppelkröte</text>
<text x="800" y="660" text-anchor="middle" class="small med">N. phrenicus C3–5 · Kuppel sinkt</text>
<!-- route -->
<path class="route" d="M220 700 C190 420 300 280 480 315 C620 200 720 260 760 415 C890 230 1160 230 1250 425 C1365 640 1290 805 1060 805 C900 805 835 705 800 635"/>
<!-- Group 2 rib ladder/intercostals -->
<g class="rough">
 <path d="M190 355 C300 310 425 310 535 355" fill="none" stroke="#f8f8f2" stroke-width="7" opacity=".55"/>
 <path d="M210 415 C320 370 440 370 550 415" fill="none" stroke="#f8f8f2" stroke-width="7" opacity=".50"/>
 <path d="M230 480 C340 435 455 435 565 480" fill="none" stroke="#f8f8f2" stroke-width="7" opacity=".45"/>
 <circle cx="305" cy="407" r="43" fill="#50fa7b" stroke="#f8f8f2" stroke-width="6"/>
 <path d="M285 452 l-44 62 M326 452 l46 62 M305 450 l0 96" stroke="#50fa7b" stroke-width="16" stroke-linecap="round"/>
 <text x="285" y="293" class="label big green">2 Rippenleiter</text>
 <text x="285" y="326" class="small med">Interkostalmuskeln · Th1–11</text>
</g>
<!-- Group 3 neck/scalene -->
<g class="rough">
 <path d="M545 285 C590 210 655 180 720 226" fill="none" stroke="#50fa7b" stroke-width="12" stroke-linecap="round"/>
 <circle cx="625" cy="245" r="47" fill="#bd93f9" stroke="#f8f8f2" stroke-width="6"/>
 <path d="M612 290 L560 400 M635 290 L700 405" stroke="#bd93f9" stroke-width="18" stroke-linecap="round"/>
 <path d="M655 300 L770 395" stroke="#50fa7b" stroke-width="12" stroke-linecap="round"/>
 <text x="545" y="195" class="label med green">3 Hals-Zugmannschaft</text>
 <text x="560" y="228" class="small med">SCM + Scaleni · C/Accessorius</text>
</g>
<!-- Group 4 pectoralis cranes -->
<g class="rough">
 <rect x="1010" y="250" width="210" height="115" rx="28" fill="#44475a" stroke="#f8f8f2" stroke-width="5" opacity=".78"/>
 <path d="M1035 355 L980 478 M1190 355 L1260 478" stroke="#50fa7b" stroke-width="14" stroke-linecap="round"/>
 <path d="M1115 248 L1115 178 L1260 210" stroke="#f1fa8c" stroke-width="10" stroke-linecap="round" fill="none"/>
 <circle cx="1270" cy="215" r="28" fill="#50fa7b" stroke="#f8f8f2" stroke-width="5"/>
 <text x="982" y="223" class="label med green">4 Brust-Kräne</text>
 <text x="982" y="257" class="small med">Pectoralis major/minor · Arme fixiert</text>
</g>
<!-- Group 5 serratus saw wall -->
<g class="rough">
 <path d="M210 655 l46 -25 l46 25 l46 -25 l46 25 l46 -25 l46 25" fill="none" stroke="#50fa7b" stroke-width="13" stroke-linecap="round"/>
 <circle cx="508" cy="652" r="44" fill="#50fa7b" stroke="#f8f8f2" stroke-width="6"/>
 <path d="M532 650 C620 605 650 560 682 495" stroke="#ff79c6" stroke-width="10" fill="none" stroke-linecap="round"/>
 <text x="210" y="607" class="label big green">5 Sägezahn-Wand</text>
 <text x="210" y="641" class="small med">Serrati posterior sup/inf + anterior</text>
</g>
<!-- Group 6 abdominal press -->
<g class="rough">
 <rect x="910" y="670" width="260" height="155" rx="35" fill="#ffb86c" opacity=".30" stroke="#ffb86c" stroke-width="7"/>
 <path d="M940 745 C980 690 1020 690 1060 745 C1100 800 1140 800 1160 735" fill="none" stroke="#ffb86c" stroke-width="14" stroke-linecap="round"/>
 <path d="M930 675 L1165 825 M1165 675 L930 825" stroke="#ff79c6" stroke-width="8" stroke-linecap="round" opacity=".8"/>
 <text x="905" y="632" class="label med orange">6 Bauchpresse</text>
 <text x="905" y="666" class="small med">Rectus · Transversus · Obliqui</text>
</g>
<!-- Group 7 back/cough/transversus thoracis -->
<g class="rough">
 <circle cx="1320" cy="665" r="55" fill="#ffb86c" stroke="#f8f8f2" stroke-width="6"/>
 <path d="M1295 710 C1245 780 1215 820 1160 850" stroke="#ffb86c" stroke-width="18" stroke-linecap="round" fill="none"/>
 <path d="M1350 705 C1400 780 1435 820 1480 850" stroke="#ffb86c" stroke-width="18" stroke-linecap="round" fill="none"/>
 <path d="M1240 555 C1295 530 1370 530 1425 555" stroke="#f8f8f2" stroke-width="8" opacity=".5"/>
 <path d="M1270 555 L1390 555" stroke="#ff79c6" stroke-width="10" stroke-linecap="round"/>
 <text x="1195" y="500" class="label big orange">7 Husten-Rücken-Tor</text>
 <text x="1195" y="534" class="small med">Quadratus · Latissimus · Transv. thoracis</text>
</g>
<!-- red group number badges -->
<g font-family="Inter,system-ui,sans-serif" font-weight="1000" font-size="34" text-anchor="middle">
  <g><circle cx="740" cy="520" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="740" y="532" fill="white">1</text></g>
  <g><circle cx="200" cy="380" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="200" y="392" fill="white">2</text></g>
  <g><circle cx="520" cy="245" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="520" y="257" fill="white">3</text></g>
  <g><circle cx="1000" cy="310" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="1000" y="322" fill="white">4</text></g>
  <g><circle cx="185" cy="650" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="185" y="662" fill="white">5</text></g>
  <g><circle cx="885" cy="705" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="885" y="717" fill="white">6</text></g>
  <g><circle cx="1190" cy="575" r="34" fill="#ff5555" stroke="#f8f8f2" stroke-width="5"/><text x="1190" y="587" fill="white">7</text></g>
</g>
<text x="800" y="948" text-anchor="middle" class="small mini">Route: Kuppel → Rippenleiter → Halszug → Brustkräne → Sägezahnwand → Bauchpresse → Husten-Rücken-Tor</text>
</svg>