<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1220" role="img" aria-labelledby="title desc">
  <title id="title">Dracula-Schema der Arteria carotis externa mit aufgeräumter Topographie</title>
  <desc id="desc">Aufgeräumtes Lernschema: A. carotis externa und Äste zentral; Venen, Nerven und Lymphknoten als getrennte, beschriftete Rand- und Inset-Layer ohne Überlappung.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#282a36"/><stop offset="1" stop-color="#1e1f29"/></linearGradient>
    <linearGradient id="artery" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffb86c"/><stop offset=".28" stop-color="#ff5555"/><stop offset="1" stop-color="#c83f4a"/></linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M1,1 L9,5 L1,9 Z" fill="#ff5555"/></marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M1,1 L9,5 L1,9 Z" fill="#ff79c6"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".38"/></filter>
    <style>
      .bg{fill:url(#bg)}.panel{fill:#44475a;stroke:#6272a4;stroke-width:2.5;filter:url(#shadow)}.panel2{fill:#343746;stroke:#6272a4;stroke-width:2}
      .title{font-family:Inter,Arial,sans-serif;font-size:44px;font-weight:950;fill:#f8f8f2}.subtitle{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:750;fill:#c7c9d9}.tiny{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:750;fill:#c7c9d9}.small{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:800;fill:#c7c9d9}.lbl{font-family:Inter,Arial,sans-serif;font-size:24px;font-weight:950;fill:#f8f8f2}.sub{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:800;fill:#c7c9d9}
      .main{fill:none;stroke:url(#artery);stroke-width:24;stroke-linecap:round;stroke-linejoin:round;filter:url(#shadow)}.internal{fill:none;stroke:#ffb86c;stroke-width:14;stroke-linecap:round;stroke-linejoin:round;opacity:.72}.branch{fill:none;stroke:#ff5555;stroke-width:9.5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed)}.branch.med{stroke:#ff79c6;stroke-width:9;marker-end:url(#arrowPink)}.branch.dorsal{stroke:#ff6e6e}.branch.end{stroke:#ff5555;stroke-width:10}
      .guide{fill:none;stroke:#8be9fd;stroke-width:2.4;stroke-dasharray:7 8;opacity:.78}.silhouette{fill:#343746;stroke:#6272a4;stroke-width:4;opacity:.55}.jaw{fill:none;stroke:#6272a4;stroke-width:14;stroke-linecap:round;opacity:.42}
      .labelBox{fill:#343746;stroke:#6272a4;stroke-width:2.5;filter:url(#shadow)}.labelBox.ventral{stroke:#ffb86c}.labelBox.med{stroke:#ff79c6}.labelBox.dorsal{stroke:#ff5555}.labelBox.end{stroke:#f1fa8c}.num{fill:#ff5555;stroke:#f8f8f2;stroke-width:4}.numTxt{font-family:Inter,Arial,sans-serif;font-size:25px;font-weight:1000;fill:#f8f8f2;text-anchor:middle;dominant-baseline:central}
      .vein{fill:none;stroke:#8be9fd;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;opacity:.82;stroke-dasharray:18 12}.veinThin{fill:none;stroke:#8be9fd;stroke-width:5.5;stroke-linecap:round;stroke-linejoin:round;opacity:.55;stroke-dasharray:12 10}.nerve{fill:none;stroke:#bd93f9;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;opacity:.68;stroke-dasharray:3 11}.nerveGold{fill:none;stroke:#f1fa8c;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;opacity:.68;stroke-dasharray:3 11}.lymph{fill:none;stroke:#50fa7b;stroke-width:4.5;stroke-linecap:round;stroke-linejoin:round;opacity:.50;stroke-dasharray:7 11}.node{fill:#50fa7b;stroke:#282a36;stroke-width:2.5;opacity:.95}
      .callout{fill:#343746;stroke:#6272a4;stroke-width:2.2;filter:url(#shadow)}.callLine{fill:none;stroke:#6272a4;stroke-width:2.2;stroke-dasharray:5 8;opacity:.85}.veinLabel{fill:#8be9fd}.nerveLabel{fill:#bd93f9}.nerveGoldLabel{fill:#f1fa8c}.lymphLabel{fill:#50fa7b}.callTitle{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:950}.callText{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:750;fill:#c7c9d9}
      .group{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:1000;letter-spacing:.10em;fill:#282a36}.groupPill{filter:url(#shadow)}
    </style>
  </defs>

  <rect class="bg" width="1920" height="1220" rx="0"/>
  <text x="64" y="70" class="title">A. carotis externa – Äste + saubere Topographie</text>
  <text x="66" y="108" class="subtitle">Dracula Theme · Arterien rot/orange · Venen cyan · Nerven violett/gelb · Lymph grün · Topographie als Rand-Callouts statt Überlappung</text>

  <!-- central neat drawing area -->
  <rect class="panel" x="455" y="145" width="830" height="835" rx="34"/>
  <path class="silhouette" d="M870 172 C1015 214 1098 338 1095 494 C1092 655 990 788 842 838 C912 710 925 590 895 462 C864 330 806 235 870 172Z"/>
  <path class="jaw" d="M908 700 C995 696 1060 670 1105 620"/>
  <path class="jaw" d="M682 858 C790 844 910 866 1015 932"/>

  <!-- carotid trunk and ICA -->
  <path class="main" d="M760 928 C768 810 778 704 797 596 C817 480 854 365 895 250 C912 204 935 168 965 128"/>
  <path class="internal" d="M798 596 C730 516 684 420 660 298 C653 262 650 228 649 190"/>
  <text x="552" y="190" class="sub">A. carotis interna</text>
  <text x="596" y="956" class="sub">A. carotis communis</text>
  <text x="982" y="138" class="sub">A. carotis externa</text>

  <!-- branches only, no text overlap -->
  <path class="branch" d="M795 640 C695 655 600 707 500 790"/>
  <path class="branch" d="M816 532 C700 520 608 474 510 398"/>
  <path class="branch" d="M848 450 C742 410 665 340 596 242"/>
  <path class="branch med" d="M832 490 C912 456 978 390 1036 310"/>
  <path class="branch dorsal" d="M864 406 C960 410 1035 456 1120 532"/>
  <path class="branch dorsal" d="M890 342 C970 292 1040 230 1125 178"/>
  <path class="branch dorsal" d="M920 272 C1030 262 1128 225 1215 178"/>
  <path class="branch end" d="M962 128 C1085 144 1195 190 1265 250"/>
  <path class="branch end" d="M962 128 C1025 70 1105 54 1198 70"/>

  <!-- subtle topography paths within central panel, routed away from labels -->
  <path class="vein" d="M690 930 C696 805 708 690 730 574 C750 455 785 320 826 176"/>
  <path class="nerve" d="M728 930 C737 807 752 690 777 572 C802 450 835 318 880 168"/>
  <path class="nerveGold" d="M1112 402 C1010 385 930 398 850 438 C775 475 706 492 620 492"/>
  <path class="nerve" d="M760 260 C825 235 900 210 985 160"/>
  <path class="nerve" d="M720 684 C650 710 585 750 520 812"/>
  <path class="veinThin" d="M540 362 C640 402 735 430 828 494"/>
  <ellipse cx="1110" cy="214" rx="92" ry="70" fill="#44475a" stroke="#6272a4" stroke-width="3" opacity=".72"/>
  <path class="veinThin" d="M1134 140 C1124 185 1117 225 1112 276 C1106 326 1088 374 1062 420"/>
  <path class="nerveGold" d="M1082 190 C1145 194 1200 215 1250 246"/>
  <path class="nerveGold" d="M1082 190 C1138 172 1184 145 1230 112"/>
  <path class="lymph" d="M655 880 C654 750 666 620 690 500 C710 400 745 288 792 190"/>
  <circle class="node" cx="662" cy="765" r="10"/><circle class="node" cx="676" cy="645" r="10"/><circle class="node" cx="702" cy="520" r="10"/><circle class="node" cx="604" cy="410" r="9"/><circle class="node" cx="1110" cy="292" r="9"/>

  <!-- labels placed outside central drawing, with clear guide lines -->
  <path class="guide" d="M500 790 C455 805 410 820 372 838"/>
  <g transform="translate(78 805)"><rect class="labelBox ventral" width="310" height="78" rx="18"/><circle class="num" cx="38" cy="39" r="25"/><text class="numTxt" x="38" y="40">1</text><text class="lbl" x="80" y="34">A. thyroidea</text><text class="sub" x="80" y="60">superior</text></g>
  <path class="guide" d="M510 398 C455 392 410 392 366 394"/>
  <g transform="translate(98 362)"><rect class="labelBox ventral" width="260" height="66" rx="18"/><circle class="num" cx="38" cy="33" r="25"/><text class="numTxt" x="38" y="34">2</text><text class="lbl" x="80" y="42">A. lingualis</text></g>
  <path class="guide" d="M596 242 C520 230 456 220 388 206"/>
  <g transform="translate(105 174)"><rect class="labelBox ventral" width="248" height="66" rx="18"/><circle class="num" cx="38" cy="33" r="25"/><text class="numTxt" x="38" y="34">3</text><text class="lbl" x="80" y="42">A. facialis</text></g>

  <path class="guide" d="M1036 310 C1100 302 1168 300 1230 304"/>
  <g transform="translate(1248 292)"><rect class="labelBox med" width="325" height="78" rx="18"/><circle class="num" cx="38" cy="39" r="25"/><text class="numTxt" x="38" y="40">4</text><text class="lbl" x="80" y="34">A. pharyngea</text><text class="sub" x="80" y="60">ascendens ↑</text></g>
  <path class="guide" d="M1120 532 C1182 548 1235 580 1280 632"/>
  <g transform="translate(1290 608)"><rect class="labelBox dorsal" width="330" height="82" rx="18"/><circle class="num" cx="38" cy="41" r="25"/><text class="numTxt" x="38" y="42">5</text><text class="lbl" x="80" y="35">R. sterno-</text><text class="sub" x="80" y="63">cleidomastoideus</text></g>
  <path class="guide" d="M1125 178 C1184 138 1238 116 1295 102"/>
  <g transform="translate(1310 76)"><rect class="labelBox dorsal" width="258" height="66" rx="18"/><circle class="num" cx="38" cy="33" r="25"/><text class="numTxt" x="38" y="34">6</text><text class="lbl" x="80" y="42">A. occipitalis</text></g>
  <path class="guide" d="M1215 178 C1270 162 1322 158 1372 166"/>
  <g transform="translate(1385 154)"><rect class="labelBox dorsal" width="300" height="70" rx="18"/><circle class="num" cx="38" cy="35" r="25"/><text class="numTxt" x="38" y="36">7</text><text class="lbl" x="80" y="31">A. auricularis</text><text class="sub" x="80" y="58">posterior</text></g>
  <path class="guide" d="M1265 250 C1325 270 1372 306 1410 356"/>
  <g transform="translate(1420 356)"><rect class="labelBox end" width="240" height="66" rx="18"/><circle class="num" cx="38" cy="33" r="25"/><text class="numTxt" x="38" y="34">8</text><text class="lbl" x="80" y="42">A. maxillaris</text></g>
  <path class="guide" d="M1198 70 C1268 48 1328 40 1390 42"/>
  <g transform="translate(1400 34)"><rect class="labelBox end" width="310" height="78" rx="18"/><circle class="num" cx="38" cy="39" r="25"/><text class="numTxt" x="38" y="40">9</text><text class="lbl" x="80" y="34">A. temporalis</text><text class="sub" x="80" y="60">superficialis</text></g>

  <!-- topography callouts in clean rows -->
  <g transform="translate(64 970)"><rect class="callout" width="640" height="178" rx="22"/><text x="24" y="34" class="callTitle veinLabel">Venen</text><text x="24" y="64" class="callText">V. jugularis interna: lateral in der Karotisscheide.</text><text x="24" y="91" class="callText">V. facialis / communis: Gesichtsabfluss zur VJI.</text><text x="24" y="118" class="callText">V. retromandibularis: in der Parotis, oberflächlicher als ACE.</text><text x="24" y="150" class="callText">Cyan gestrichelt = venöse Leitstruktur/Drainage.</text></g>
  <g transform="translate(720 970)"><rect class="callout" width="640" height="178" rx="22"/><text x="24" y="34" class="callTitle nerveLabel">Nerven</text><text x="24" y="64" class="callText">N. vagus X: posterior zwischen Arterie und VJI.</text><text x="24" y="91" class="callText">N. hypoglossus XII: kreuzt oberhalb der Bifurkation zur Zunge.</text><text x="24" y="118" class="callText">N. glossopharyngeus IX: zwischen ACI und ACE zur Pharynxwand.</text><text x="24" y="145" class="callText">R. externus N. laryngeus sup.: mit A. thyroidea superior.</text></g>

  <!-- exact cross-section and parotid inset -->
  <g transform="translate(1510 720)"><rect class="panel2" width="330" height="220" rx="22"/><text x="22" y="32" class="small" fill="#f8f8f2">Karotisscheide – Querschnitt</text><circle cx="115" cy="112" r="42" fill="#ff5555" opacity=".25" stroke="#ff5555" stroke-width="6"/><text x="115" y="118" text-anchor="middle" class="small">A. carotis</text><circle cx="224" cy="110" r="48" fill="#8be9fd" opacity=".20" stroke="#8be9fd" stroke-width="6"/><text x="224" y="116" text-anchor="middle" class="small">VJI</text><circle cx="172" cy="166" r="19" fill="#bd93f9" opacity=".35" stroke="#bd93f9" stroke-width="5"/><text x="172" y="172" text-anchor="middle" class="small">X</text><text x="34" y="204" class="tiny">medial A. · lateral VJI · posterior X</text></g>
  <g transform="translate(1510 970)"><rect class="callout" width="330" height="178" rx="22"/><text x="22" y="34" class="callTitle nerveGoldLabel">Parotis-Schichten</text><text x="22" y="64" class="callText">oberflächlich: N. facialis VII</text><text x="22" y="91" class="callText">mittig: V. retromandibularis</text><text x="22" y="118" class="callText">tief: ACE-Endäste</text><text x="22" y="150" class="callText">+ parotideale/präaurikuläre LK</text></g>

  <rect class="groupPill" x="464" y="740" width="150" height="32" rx="15" fill="#ffb86c"/><text x="539" y="762" class="group" text-anchor="middle">VENTRAL</text>
  <rect class="groupPill" x="1050" y="338" width="130" height="32" rx="15" fill="#ff79c6"/><text x="1115" y="360" class="group" text-anchor="middle">MEDIAL</text>
  <rect class="groupPill" x="1145" y="490" width="125" height="32" rx="15" fill="#ff5555"/><text x="1208" y="512" class="group" text-anchor="middle">DORSAL</text>
  <rect class="groupPill" x="1190" y="72" width="125" height="32" rx="15" fill="#f1fa8c"/><text x="1253" y="94" class="group" text-anchor="middle">ENDÄSTE</text>

  <text x="64" y="1190" class="tiny">Selbst gezeichnetes Lernschema; Äste/Gruppen nach DocCheck Flexikon. Topographie ist bewusst schematisch: genaue Beziehungen als Rand-Callouts und Insets, nicht als überlappende Präparationszeichnung.</text>
</svg>
