<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 980" role="img" aria-labelledby="title desc">
  <title id="title">Elegantes Schema der Arteria carotis externa und ihrer Äste</title>
  <desc id="desc">Übersichtliches Lernschema der Arteria carotis externa: zentrale Gefäßkurve, sauber verteilte Äste, gruppiert in ventrale, mediale, dorsale Äste und Endäste.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf0"/><stop offset="1" stop-color="#fdebd0"/>
    </linearGradient>
    <linearGradient id="artery" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef4444"/>
      <stop offset="0.58" stop-color="#c81e2b"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#b91c1c"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#9f1239"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7c2d12" flood-opacity=".16"/>
    </filter>
    <style>
      .bg{fill:url(#paper)}
      .silhouette{fill:#fff2d9;stroke:#e9c89d;stroke-width:4;opacity:.78}
      .jaw{fill:none;stroke:#d8b384;stroke-width:18;stroke-linecap:round;opacity:.55}
      .main{fill:none;stroke:url(#artery);stroke-width:28;stroke-linecap:round;stroke-linejoin:round;filter:url(#softShadow)}
      .internal{fill:none;stroke:#f4a6a6;stroke-width:18;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:0;opacity:.9}
      .branch{fill:none;stroke:#dc2626;stroke-width:13;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrowRed)}
      .branch.med{stroke:#be185d;stroke-width:11;marker-end:url(#arrowMuted)}
      .branch.dorsal{stroke:#b91c1c;stroke-width:12}
      .branch.end{stroke:#991b1b;stroke-width:13}
      .guide{fill:none;stroke:#d6b98c;stroke-width:2;stroke-dasharray:7 9;opacity:.55}
      .labelBox{fill:#fffdf8;stroke:#d6b98c;stroke-width:2.5;filter:url(#softShadow)}
      .labelBox.ventral{stroke:#f97316}.labelBox.med{stroke:#be185d}.labelBox.dorsal{stroke:#dc2626}.labelBox.end{stroke:#7f1d1d}
      .num{fill:#e11d48;stroke:#fff;stroke-width:5}.numTxt{font-family:Inter,Arial,sans-serif;font-size:27px;font-weight:1000;fill:#fff;text-anchor:middle;dominant-baseline:central}
      .title{font-family:Inter,Arial,sans-serif;font-size:42px;font-weight:950;fill:#3a2117}.subtitle{font-family:Inter,Arial,sans-serif;font-size:22px;font-weight:700;fill:#7c3f24}.lbl{font-family:Inter,Arial,sans-serif;font-size:25px;font-weight:900;fill:#30160f}.sub{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:750;fill:#79432b}.tiny{font-family:Inter,Arial,sans-serif;font-size:17px;font-weight:700;fill:#7c3f24}.group{font-family:Inter,Arial,sans-serif;font-size:18px;font-weight:1000;letter-spacing:.12em;fill:#fff}.groupPill{rx:15;filter:url(#softShadow)}
    </style>
  </defs>

  <rect class="bg" width="1560" height="980" rx="42"/>
  <text x="70" y="72" class="title">A. carotis externa – Äste</text>
  <text x="72" y="108" class="subtitle">Merkspruch-Reihenfolge: Theo · leckt · fröhlich · Pharao · streichelt · Opa · Ohr · Max · tanzt</text>

  <!-- subtle anatomical context -->
  <path class="silhouette" d="M815 112 C970 150 1078 286 1080 456 C1084 640 962 786 790 838 C878 720 906 574 870 430 C836 294 773 197 815 112Z"/>
  <path class="jaw" d="M853 690 C942 692 1018 666 1070 614"/>
  <path class="jaw" d="M690 850 C806 838 933 866 1030 930"/>

  <!-- trunk and bifurcation -->
  <path class="main" d="M642 888 C650 780 658 682 673 584 C690 474 720 367 759 255 C777 204 799 157 830 111"/>
  <path class="internal" d="M674 584 C612 507 562 412 536 284 C528 246 523 212 520 180"/>
  <text x="493" y="171" class="sub">A. carotis interna</text>
  <text x="472" y="922" class="sub">A. carotis communis</text>
  <text x="843" y="128" class="sub">A. carotis externa</text>

  <!-- group pills -->
  <rect class="groupPill" x="86" y="742" width="190" height="34" fill="#f97316"/><text x="181" y="765" class="group" text-anchor="middle">VENTRAL</text>
  <rect class="groupPill" x="930" y="348" width="160" height="34" fill="#be185d"/><text x="1010" y="371" class="group" text-anchor="middle">MEDIAL</text>
  <rect class="groupPill" x="1010" y="518" width="155" height="34" fill="#dc2626"/><text x="1087" y="541" class="group" text-anchor="middle">DORSAL</text>
  <rect class="groupPill" x="1110" y="62" width="165" height="34" fill="#7f1d1d"/><text x="1192" y="85" class="group" text-anchor="middle">ENDÄSTE</text>

  <!-- branches: ventral left -->
  <path class="branch" d="M671 600 C565 614 450 668 330 762"/>
  <path class="branch" d="M691 505 C573 489 456 444 330 365"/>
  <path class="branch" d="M716 424 C596 386 486 314 382 210"/>

  <!-- medial/dorsal/right -->
  <path class="branch med" d="M709 464 C800 434 868 374 925 314"/>
  <path class="branch dorsal" d="M731 382 C835 386 917 422 1000 500"/>
  <path class="branch dorsal" d="M757 320 C845 268 910 199 988 145"/>
  <path class="branch dorsal" d="M782 258 C908 247 1030 211 1135 168"/>

  <!-- end branches -->
  <path class="branch end" d="M829 112 C990 128 1130 172 1270 242"/>
  <path class="branch end" d="M829 112 C910 45 1015 30 1148 42"/>

  <!-- soft guide lines from labels to branches -->
  <path class="guide" d="M312 775 C330 770 335 765 350 755"/>
  <path class="guide" d="M295 366 C315 365 325 365 345 365"/>
  <path class="guide" d="M350 210 C365 211 375 212 390 214"/>
  <path class="guide" d="M924 315 C940 309 956 304 972 298"/>
  <path class="guide" d="M1015 503 C1032 502 1048 503 1064 505"/>
  <path class="guide" d="M990 145 C1004 141 1018 137 1033 133"/>
  <path class="guide" d="M1138 168 C1154 164 1170 160 1187 157"/>
  <path class="guide" d="M1274 244 C1288 246 1300 250 1312 256"/>
  <path class="guide" d="M1152 42 C1168 41 1184 42 1200 44"/>

  <!-- labels left -->
  <g transform="translate(70 785)"><rect class="labelBox ventral" width="285" height="74" rx="18"/><circle class="num" cx="36" cy="37" r="25"/><text class="numTxt" x="36" y="38">1</text><text class="lbl" x="76" y="32">A. thyroidea</text><text class="sub" x="76" y="58">superior</text></g>
  <g transform="translate(70 330)"><rect class="labelBox ventral" width="242" height="62" rx="18"/><circle class="num" cx="36" cy="31" r="25"/><text class="numTxt" x="36" y="32">2</text><text class="lbl" x="76" y="40">A. lingualis</text></g>
  <g transform="translate(95 170)"><rect class="labelBox ventral" width="225" height="62" rx="18"/><circle class="num" cx="36" cy="31" r="25"/><text class="numTxt" x="36" y="32">3</text><text class="lbl" x="76" y="40">A. facialis</text></g>

  <!-- labels right -->
  <g transform="translate(965 288)"><rect class="labelBox med" width="300" height="74" rx="18"/><circle class="num" cx="36" cy="37" r="25"/><text class="numTxt" x="36" y="38">4</text><text class="lbl" x="76" y="32">A. pharyngea</text><text class="sub" x="76" y="58">ascendens ↑</text></g>
  <g transform="translate(1032 472)"><rect class="labelBox dorsal" width="315" height="78" rx="18"/><circle class="num" cx="36" cy="39" r="25"/><text class="numTxt" x="36" y="40">5</text><text class="lbl" x="76" y="34">R. sterno-</text><text class="sub" x="76" y="61">cleidomastoideus</text></g>
  <g transform="translate(1015 108)"><rect class="labelBox dorsal" width="245" height="62" rx="18"/><circle class="num" cx="36" cy="31" r="25"/><text class="numTxt" x="36" y="32">6</text><text class="lbl" x="76" y="40">A. occipitalis</text></g>
  <g transform="translate(1180 142)"><rect class="labelBox dorsal" width="280" height="66" rx="18"/><circle class="num" cx="36" cy="33" r="25"/><text class="numTxt" x="36" y="34">7</text><text class="lbl" x="76" y="30">A. auricularis</text><text class="sub" x="76" y="55">posterior</text></g>
  <g transform="translate(1310 246)"><rect class="labelBox end" width="224" height="62" rx="18"/><circle class="num" cx="36" cy="31" r="25"/><text class="numTxt" x="36" y="32">8</text><text class="lbl" x="76" y="40">A. maxillaris</text></g>
  <g transform="translate(1110 14)"><rect class="labelBox end" width="285" height="74" rx="18"/><circle class="num" cx="36" cy="37" r="25"/><text class="numTxt" x="36" y="38">9</text><text class="lbl" x="76" y="32">A. temporalis</text><text class="sub" x="76" y="58">superficialis</text></g>

  <!-- compact orientation notes -->
  <g transform="translate(80 560)">
    <rect x="0" y="0" width="360" height="116" rx="20" fill="#fffdf8" stroke="#ead5b5" stroke-width="2" opacity=".95"/>
    <text x="22" y="34" class="sub">Leserichtung</text>
    <text x="22" y="64" class="tiny">kaudal → kranial: 1–3 ventral,</text>
    <text x="22" y="90" class="tiny">4 medial, 5–7 dorsal, 8–9 Endäste.</text>
  </g>
  <text x="70" y="946" class="tiny">Selbst gezeichnetes Lernschema; Äste/Gruppen nach DocCheck Flexikon. Varianten möglich, besonders beim R. sternocleidomastoideus.</text>
</svg>
